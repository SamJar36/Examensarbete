networks:
  examensarbete_network:
    driver: bridge

services:
  highscoreservice:
    image: highscoreservice
    build:
      context: .
      dockerfile: Examensarbete.HighscoreMicroService/Dockerfile
    ports:
      - "5001:8080"
    networks:
      - examensarbete_network
    depends_on:
      - highscoredb

  playerservice:
    image: playerservice
    build:
      context: .
      dockerfile: Examensarbete.PlayerMicroService/Dockerfile
    ports:
      - "5004:8080"
    networks:
      - examensarbete_network
    depends_on:
      - highscoredb

  apigateway:
    image: apigateway
    build:
      context: .
      dockerfile: Examensarbete.Api/Dockerfile
    ports:
      - "5002:8080"
    networks:
      - examensarbete_network

  blazorclient:
    image: blazorclient
    build:
      context: .
      dockerfile: Examensarbete.Blazor/Dockerfile
    ports:
      - "5003:8080"
    networks:
      - examensarbete_network
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  highscoredb:
    image: mongo:4.4
    container_name: highscoredb
    environment:
      MONGO_INITDB_ROOT_USERNAME: samjar
      MONGO_INITDB_ROOT_PASSWORD: howaboutthemapples3
      MONGO_INITDB_DATABASE: highscoredb
    ports:
      - "27017:27017"
    volumes:
      - highscoredbdata:/data/db
    networks:
      - examensarbete_network

volumes:
  highscoredbdata:
  
